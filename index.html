<!DOCTYPE html>
<html>
<head>
<title>ECE Farewell Invitation</title>

<style>
body{
background:black;
color:white;
font-family:Arial;
text-align:center;
margin-top:20%;
}

#count{
font-size:120px;
}

.hidden{
display:none;
}

.message{
font-size:40px;
}
</style>

</head>

<body>

<div id="count">5</div>

<div id="surprise" class="hidden message">
✨ Wait for it... ✨
</div>

<div id="welcome" class="hidden message">
🎓 Welcoming Our Beloved Seniors 🎓
</div>

<div id="final" class="hidden message">
Farewell Celebration<br><br>
Date: ______ <br>
Time: ______ <br>
Venue: ______
</div>

<script>

let num = 5;
let counter = document.getElementById("count");

let timer = setInterval(function(){

num--;
counter.innerHTML = num;

if(num==0){
clearInterval(timer);
counter.style.display="none";

document.getElementById("surprise").classList.remove("hidden");

setTimeout(()=>{
document.getElementById("surprise").style.display="none";
document.getElementById("welcome").classList.remove("hidden");
},2000);

setTimeout(()=>{
document.getElementById("welcome").style.display="none";
document.getElementById("final").classList.remove("hidden");
},4000);

}

},1000);

</script>

</body>
</html>
